services:
  app:
    build: .
    image: maori-stock-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro               # secrets (read-only)
      - ${HOME}/.claude:/root/.claude:ro  # Claude Code auth (pre-done on host)
      - app_data:/data                    # SQLite persistence across restarts
    environment:
      DB_URL: sqlite:////data/scanner.db
      TZ: Asia/Jerusalem
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app_data:
